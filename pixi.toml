[workspace]
channels = ["https://conda.modular.com/max", "conda-forge"]
name = "requests"
platforms = ["linux-64"]
version = "0.3.0"

[activation]
env = { TLS_PURE = "../tls_pure" }

[tasks]
run = "bash build_and_run.sh main.mojo"
test = "bash -c 'python test_server.py & python test_proxy_server.py & sleep 1 && bash build_and_run.sh test_client.mojo; RET=$?; kill %1 %2 2>/dev/null; exit $RET'"
test-hpack = "bash build_and_run.sh test_hpack.mojo"
test-h2 = "bash build_and_run.sh test_h2.mojo"
test-h2-conn = "bash build_and_run.sh test_h2_conn.mojo"
format = "mblack http_client.mojo main.mojo test_client.mojo"

[dependencies]
mojo = ">=0.26.2"
brotli = ">=1.0"
zstd = ">=1.5"

[pypi-dependencies]
brotli = ">=1.0"
zstandard = ">=0.22"
